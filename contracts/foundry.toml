[profile.default]
src = "src"
out = "out"
libs = ["dependencies"]

[fmt]
line_length = 90

[doc]
out = "forge-docs"

[invariant]
fail_on_revert = true

[dependencies]
forge-std = "1.9.7"
"@openzeppelin-contracts" = "5.0.0"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
