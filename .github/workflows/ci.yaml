name: release

on:
  push:
    tags:
        - "*"
  pull_request:
    branches:
        - main
  workflow_dispatch:

jobs:
  package:
    env:
      REGISTRY: ghcr.io
      TRIBES_MCP_IMAGE_NAME: ${{ github.repository }}-mcp
      TRIBES_MACHINE_IMAGE_NAME: ${{ github.repository }}-machine
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for riscv64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: Show Buildx builders
        run: docker buildx ls

      # MCP IMAGE (multiplataforma, buildx action)
      - name: Log in to the Container registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.TRIBES_MCP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push Tribes MCP image
        if: startsWith(github.ref, 'refs/tags/')
        id: push-mcp
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}

      - name: Build Tribes MCP image (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}

      # MACHINE IMAGE (apenas riscv64, comando manual)
      - name: Log in to GitHub Container Registry (machine)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Cartesi Machine image (riscv64)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker buildx build \
            --platform linux/riscv64 \
            --file ./build/Dockerfile.machine \
            --tag ghcr.io/${{ github.repository }}-machine:latest \
            --push \
            .

      - name: Build Cartesi Machine image (no push, riscv64)
        if: github.event_name == 'pull_request'
        run: |
          docker buildx build \
            --platform linux/riscv64 \
            --file ./build/Dockerfile.machine \
            --tag ghcr.io/${{ github.repository }}-machine:pr \
            --load \
            .

      - name: Generate artifact attestation for MCP
        if: startsWith(github.ref, 'refs/tags/') && steps.push-mcp.outputs.digest != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.TRIBES_MCP_IMAGE_NAME }}
          subject-digest: ${{ steps.push-mcp.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation for Machine
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.TRIBES_MACHINE_IMAGE_NAME }}
          subject-digest: ${{ steps.push-machine.outputs.digest }}
          push-to-registry: true

  release:
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build Tribes Rollup binary
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: ./cmd/tribes-rollup
      - name: Build Tribes MCP binary
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: ./cmd/tribes-mcp