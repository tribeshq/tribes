#
# Logging
#
[logging.TRIBES_LOG_LEVEL]
default = "info"
go-type = "LogLevel"
description = """
One of "debug", "info", "warn", "error"."""
used-by = ["mcp"]

[logging.TRIBES_LOG_COLOR]
default = "true"
go-type = "bool"
description = """
If set to true, the node will add colors to its log output."""
used-by = ["mcp"]

#
# Blockchain
#

[blockchain.TRIBES_BLOCKCHAIN_ID]
go-type = "uint64"
description = """
An unique identifier representing a blockchain network."""
used-by = ["mcp"]

[blockchain.TRIBES_BLOCKCHAIN_HTTP_ENDPOINT]
go-type = "URL"
description = """
HTTP endpoint for the blockchain RPC provider."""
used-by = ["mcp"]

[blockchain.TRIBES_BLOCKCHAIN_WS_ENDPOINT]
go-type = "URL"
description = """
WebSocket endpoint for the blockchain RPC provider."""
used-by = ["mcp"]

[blockchain.TRIBES_BLOCKCHAIN_LEGACY_ENABLED]
default = "false"
go-type = "bool"
description = """
If set to true the node will send transactions using the legacy gas fee model
(instead of EIP-1559)."""
used-by = ["mcp"]

[blockchain.TRIBES_BLOCKCHAIN_DEFAULT_BLOCK]
default = "finalized"
go-type = "DefaultBlock"
description = """
The default block to be used by EVM Reader and Claimer when requesting new blocks.
One of 'latest', 'pending', 'safe', 'finalized'"""
used-by = ["mcp"]

[blockchain.TRIBES_BLOCKCHAIN_SUBSCRIPTION_TIMEOUT]
default = "60"
go-type = "uint64"
description = """
Block subscription timeout in seconds."""
used-by = ["mcp"]

[rollups.TRIBES_BLOCKCHAIN_HTTP_MAX_RETRIES]
default = "4"
go-type = "uint64"
description = """
Maximum number of retry attempts for HTTP blockchain requests after encountering an error."""
used-by = ["mcp"]

[rollups.TRIBES_BLOCKCHAIN_HTTP_RETRY_MIN_WAIT]
default = "1"
go-type = "Duration"
description = """
Minimum wait time in seconds for the exponential backoff retry policy. This is the initial delay before the first retry for HTTP blockchain requests."""
used-by = ["mcp"]

[rollups.TRIBES_BLOCKCHAIN_HTTP_RETRY_MAX_WAIT]
default = "60"
go-type = "Duration"
description = """
Maximum wait time in seconds for the exponential backoff retry policy. The delay between retries for HTTP blockchain requests will never exceed this value, regardless of the backoff calculation."""
used-by = ["mcp"]

#
# Contracts
#

[contracts.TRIBES_CONTRACTS_INPUT_BOX_ADDRESS]
default = "0xB6b39Fb3dD926A9e3FBc7A129540eEbeA3016a6c"
go-type = "Address"
description = """
Address of the InputBox contract. Required for interacting with the blockchain."""
omit = true
used-by = ["mcp"]

[contracts.TRIBES_CONTRACTS_ERC20_PORTAL_ADDRESS]
default = "0x05355c2F9bA566c06199DEb17212c3B78C1A3C31"
go-type = "Address"
description = """
Address of the ERC20 Portal contract. Required for token operations."""
omit = true
used-by = ["mcp"]

[contracts.TRIBES_CONTRACTS_APPLICATION_ADDRESS]
go-type = "Address"
description = """
Address of the Tribes application contract. Required for application interactions."""
omit = true
used-by = ["mcp"]

#
# Auth
#

[auth.TRIBES_AUTH_KIND]
default = "mnemonic"
go-type = "AuthKind"
description = """
One of "private_key", "private_key_file", "mnemonic", "mnemonic_file", "aws".

The auth variable for the kind defined here is required. Eg.: TRIBES_AUTH_MNEMONIC"""
omit = true
used-by = ["mcp"]

[auth.TRIBES_AUTH_PRIVATE_KEY]
go-type = "RedactedString"
description = """
The node will use this private key to sign transactions."""
omit = true
used-by = ["mcp"]

[auth.TRIBES_AUTH_PRIVATE_KEY_FILE]
go-type = "string"
description = """
The node will use the private key contained in this file to sign transactions."""
omit = true
used-by = ["mcp"]

[auth.TRIBES_AUTH_MNEMONIC]
go-type = "RedactedString"
description = """
The node will use the private key generated from this mnemonic to sign transactions."""
omit = true
used-by = ["mcp"]

[auth.TRIBES_AUTH_MNEMONIC_FILE]
go-type = "string"
description = """
The node will use the private key generated from the mnemonic contained in this file
to sign transactions."""
omit = true
used-by = ["mcp"]

[auth.TRIBES_AUTH_MNEMONIC_ACCOUNT_INDEX]
default = "0"
go-type = "RedactedUint"
description = """
When using mnemonics to sign transactions,
the node will use this account index to generate the private key."""
omit = true
used-by = ["mcp"]